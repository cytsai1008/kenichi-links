{% for imglinks in site.imglinks %}{% if imglinks.URL %}<a class="flex" href="{{ imglinks.URL | rtrim '/' }}{% if imglinks.Username %}/{{ imglinks.Username }}{% endif %}" target="_blank"
        rel="noopener noreferrer" aria-label="{{ imglinks.Name }}">
        <span
                class="links min-h-auto lg:m-5 md:m-5 sm:m-3.5 text-white hover:opacity-75 font-semibold my-2.5 mx-5 px-5 py-1.5 rounded-md w-full sm:w-32 flex items-center justify-center h-14"
                style="{% if imglinks.Color %}background-color: {{ imglinks.Color }}; -webkit-box-shadow: 0px 10px 25px 0px {{ imglinks.Color }}80; -moz-box-shadow: 0px 10px 25px 0px {{ imglinks.Color }}80; box-shadow: 0px 10px 25px 0px {{ imglinks.Color }}80;{% else %}color: white; border: 0.10rem solid #ffffff; -webkit-box-shadow: 0px 10px 25px 0px #ffffff80; -moz-box-shadow: 0px 10px 25px 0px #ffffff80; box-shadow: 0px 10px 25px 0px #ffffff80;{% endif %}">
                <span class="link-content flex items-center" {% if imglinks.Text_Color %}style="color: {{ imglinks.Text_Color }};"{% endif %}>
                        <img src="{{ '/assets/images/links/' | append: imglinks.Img_URL | relative_url }}" class="align-middle" style="height: 2.5rem; width: 2.5rem;" alt="{{ imglinks.Name }} logo" loading="lazy" decoding="async"><span class="mx-1.5 align-middle font-normal">{{ imglinks.Name }}</span>
                </span>
        </span>
</a>{% endif %}{% endfor %}
