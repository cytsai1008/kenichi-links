{% for link in site.links %}{% if link.URL %}<a class="flex" href="{{ link.URL | rtrim '/' }}{% if link.Username %}/{{ link.Username }}{% endif %}" target="_blank"
        rel="noopener noreferrer" aria-label="{{ link.Name }}">
        <span
                class="links min-h-auto lg:m-5 md:m-5 sm:m-3.5 text-white hover:opacity-75 font-semibold my-2.5 mx-5 px-5 py-1.5 rounded-md w-full sm:w-32 flex items-center justify-center h-14"
                style="{% if link.Color %}background-color: {{ link.Color }}; -webkit-box-shadow: 0px 10px 25px 0px {{ link.Color }}80; -moz-box-shadow: 0px 10px 25px 0px {{ link.Color }}80; box-shadow: 0px 10px 25px 0px {{ link.Color }}80;{% else %}color: white; border: 0.10rem solid #ffffff; -webkit-box-shadow: 0px 10px 25px 0px #ffffff80; -moz-box-shadow: 0px 10px 25px 0px #ffffff80; box-shadow: 0px 10px 25px 0px #ffffff80;{% endif %}">
                <span class="link-content flex items-center" {% if link.Text_Color %}style="color: {{ link.Text_Color }};"{% endif %}>
                        <i class="{{ link.Icon-Class }} align-middle" aria-hidden="true"></i><span class="mx-1.5 align-middle font-normal">{{ link.Name }}</span>
                </span>
        </span>
</a>{% endif %}{% endfor %}
