name: Quality Checks

on:
  pull_request:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci
        env:
          CI: "true"

      - name: Validate configuration and templates
        run: npm run check

      - name: Build site
        run: bundle exec jekyll build
