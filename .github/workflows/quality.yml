name: Quality Checks

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci
        env:
          CI: "true"

      - name: Lint
        run: npm run lint

      - name: Build site
        run: npm run build
